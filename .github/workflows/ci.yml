name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: ERROR
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  test-fast:
    name: Test (unit + integration + contract)
    runs-on: ubuntu-latest
    needs: check
    env:
      BENDCLAW_STORAGE_DATABEND_API_BASE_URL: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_BASE_URL }}
      BENDCLAW_STORAGE_DATABEND_API_TOKEN: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest
      - name: Run fast tests
        run: cargo nextest run --test unit --test integration --test contract --no-fail-fast

  test-e2e:
    name: Test (e2e)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      BENDCLAW_STORAGE_DATABEND_API_BASE_URL: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_BASE_URL }}
      BENDCLAW_STORAGE_DATABEND_API_TOKEN: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest
      - name: Run e2e tests
        run: cargo nextest run --test e2e --no-fail-fast

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      pull-requests: write
    env:
      BENDCLAW_STORAGE_DATABEND_API_BASE_URL: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_BASE_URL }}
      BENDCLAW_STORAGE_DATABEND_API_TOKEN: ${{ secrets.BENDCLAW_STORAGE_DATABEND_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Collect coverage
        run: |
          cargo llvm-cov nextest --test unit --test integration --test contract \
            --ignore-run-fail --codecov --output-path codecov.json
          cargo llvm-cov report --html --output-dir coverage
          cargo llvm-cov report > coverage-summary.txt
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
      - name: Read coverage summary
        id: coverage
        run: |
          {
            echo 'summary<<EOF'
            cat coverage-summary.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            ## Code Coverage Report

            <details>
            <summary>Coverage Summary</summary>

            ```
            ${{ steps.coverage.outputs.summary }}
            ```

            </details>
      - uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo build --release
