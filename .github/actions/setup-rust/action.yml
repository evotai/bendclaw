name: Setup Rust
description: Install Rust toolchain and cache cargo artifacts

inputs:
  targets:
    description: Additional targets to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install protoc
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq protobuf-compiler
        protoc --version

    - name: Install Rust toolchain
      shell: bash
      run: |
        rustup show
        if [ -n "${{ inputs.targets }}" ]; then
          rustup target add ${{ inputs.targets }}
        fi

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-registry-${{ runner.os }}-${{ runner.arch }}-

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        token: ${{ github.token }}
