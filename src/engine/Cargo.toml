[package]
name = "bend-agent"
version = "0.1.0"
edition = "2021"
description = "Bend Agent - A Rust framework for building autonomous AI agents"
license = "MIT"
repository = "https://github.com/EvotAI/bendclaw"

[dependencies]
bend-base.workspace = true
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
eventsource-stream = "0.2"
uuid.workspace = true
glob = "0.3"
regex = "1"
chrono = "0.4"
async-trait = "0.1"
thiserror = "2"
bytes = "1"
pin-project-lite = "0.2"
parking_lot = "0.12"
tracing = "0.1"
base64 = "0.22"
tokio-util = "0.7"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"

[lints.clippy]
module_inception = "allow"

[[example]]
name = "01-simple-query"
path = "examples/01-simple-query.rs"

[[example]]
name = "02-multi-tool"
path = "examples/02-multi-tool.rs"

[[example]]
name = "03-multi-turn"
path = "examples/03-multi-turn.rs"

[[example]]
name = "04-prompt-api"
path = "examples/04-prompt-api.rs"

[[example]]
name = "05-custom-system-prompt"
path = "examples/05-custom-system-prompt.rs"

[[example]]
name = "06-mcp-server"
path = "examples/06-mcp-server.rs"

[[example]]
name = "07-custom-tools"
path = "examples/07-custom-tools.rs"

[[example]]
name = "08-oneshot-query"
path = "examples/08-oneshot-query.rs"

[[example]]
name = "09-subagents"
path = "examples/09-subagents.rs"

[[example]]
name = "10-permissions"
path = "examples/10-permissions.rs"

[[example]]
name = "web-chat"
path = "examples/web/main.rs"
